name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -L --max-time 60 \
          "https://snapattend-main.streamlit.app" \
          -o /dev/null -w "HTTP Status: %{http_code}\n" || true
          echo "Ping done!"
